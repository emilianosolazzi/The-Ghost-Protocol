services:
  postgres:
    image: postgres:16-alpine
    container_name: hype-coin-dao-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: hype_coin_dao
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d hype_coin_dao"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  postgres_data:
